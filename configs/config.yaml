# Quay container registry configuration
# Replace all CHANGE_ME_* values before deploying

AUTHENTICATION_TYPE: Database

# Random secret strings - generate with: openssl rand -hex 32
DATABASE_SECRET_KEY: test
SECRET_KEY: test

# PostgreSQL connection string
# Password must match POSTGRESQL_PASSWORD in quay-postgres.container
DB_URI: postgresql://quay:test@127.0.0.1:5432/quay

# Public-facing hostname (no scheme, no port)
SERVER_HOSTNAME: quay.arvhomelab.com:8443
PREFERRED_URL_SCHEME: https
EXTERNAL_TLS_TERMINATION: false

# Redis (buildlogs and user events)
BUILDLOGS_REDIS:
  host: 127.0.0.1
  port: 6379

USER_EVENTS_REDIS:
  host: 127.0.0.1
  port: 6379

# Local filesystem storage
DISTRIBUTED_STORAGE_CONFIG:
  default:
    - LocalStorage
    - storage_path: /datastorage/registry

DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
  - default

DISTRIBUTED_STORAGE_PREFERENCE:
  - default

# Registry settings
SETUP_COMPLETE: true
REGISTRY_STATE: normal

# Superusers (must be created via the Quay UI or API first)
SUPER_USERS:
  - admin

# Tag expiration
DEFAULT_TAG_EXPIRATION: 2w
TAG_EXPIRATION_OPTIONS:
  - 1d
  - 1w
  - 2w
  - 4w

# Feature flags
FEATURE_UI_V2: true
FEATURE_USER_CREATION: true
FEATURE_DIRECT_LOGIN: true
FEATURE_ANONYMOUS_ACCESS: false
FEATURE_MAILING: false
FEATURE_BUILD_SUPPORT: false
FEATURE_SECURITY_SCANNER: false
FEATURE_REPO_MIRROR: false
FEATURE_APP_REGISTRY: false
FEATURE_REQUIRE_ENCRYPTED_BASIC_AUTH: false
FEATURE_REQUIRE_TEAM_INVITE: true
FEATURE_CHANGE_TAG_EXPIRATION: true
FEATURE_APP_SPECIFIC_TOKENS: true

# Login timeout
FRESH_LOGIN_TIMEOUT: 10m
MAXIMUM_LAYER_SIZE: 20G

# ── Performance tuning (production / bare-metal) ──────────────────────────
# Database connection pool
# pool_size:    sustained connections per gunicorn worker
# max_overflow: burst connections above pool_size
# Ensure PostgreSQL max_connections > (WORKER_COUNT_REGISTRY * (pool_size + max_overflow))
DB_CONNECTION_ARGS:
  pool_size: 30
  max_overflow: 50
  pool_timeout: 30
  pool_recycle: 1800
  pool_pre_ping: true

# Gunicorn worker counts — set to match CPU core count for registry workers
# Registry workers handle push/pull; web workers handle UI and API
WORKER_COUNT: 8
WORKER_COUNT_REGISTRY: 16

# Increase gunicorn timeout to handle large layer uploads without 502
GUNICORN_TIMEOUT: 600
